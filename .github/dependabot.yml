version: 2
updates:
  - package-ecosystem: mix
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: ex_doc
        versions:
          - 0.23.0
          - 0.24.0
          - 0.24.1
      - dependency-name: credo
        versions:
          - 1.5.4
  - package-ecosystem: docker
    directories:
      - "*"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
